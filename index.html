<html>
    <head><title>Jonathan Lynch's Cool Site</title></head>
    <body>
        <center>
            <h1><img src="disk.gif">Jonathan Lynch's Cool Site<img src="disk.gif"></h1>
            <hr>
            <button id="musicButton" onclick="playMIDI()">Crank the tunes!</button>
            <a href="https://google.com" target="_blank"><button id="cvButton">CV 📄</button></a>
            <p>This site is cool!</p>
        </center>

    <script>
        var musicButton = document.getElementById('musicButton');
        var cvButton = document.getElementById('cvButton');
        musicButton.innerText= "Music ❌";
        cvButton.innerText= "Resume 📄";
        let playing = false;
        let songAudio = null;
        
        function playMIDI() {
            if (songAudio){
                songAudio.pause();
                songAudio = null;
                
                musicButton.innerText = "Music ❌";
                return;
            }
            songAudio = new Audio('passport.m4a');
            songAudio.loop = true;
            songAudio.play();
            musicButton.innerText= "Music "+" \u{1F50A}";
            
        }
    </script>
</html>
